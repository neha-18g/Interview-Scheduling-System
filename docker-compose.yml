services:

  # --------------------------------------------------------------------------
  # Redis — message broker for the RQ email job queue
  # --------------------------------------------------------------------------
  redis:
    image: redis:7.4-alpine
    container_name: iss_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data        # persists queue data across restarts
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------------------------
  # Backend — FastAPI app served by uvicorn
  # --------------------------------------------------------------------------
  backend:
    build:
      context: ./backend        # Docker looks for backend/Dockerfile
    container_name: iss_backend
    restart: unless-stopped
    env_file: .env              # loads all your secrets from the .env file
    environment:
      REDIS_URL: redis://redis:6379/0   # overrides any REDIS_URL in .env
    depends_on:
      redis:
        condition: service_healthy      # waits until Redis passes its healthcheck
      mysql:
        condition: service_healthy
    ports:
      - "8000:8000"             # optional: lets you hit the API directly at localhost:8000
    volumes:
      - uploads_data:/app/uploads/resumes   # persists uploaded resumes
      - ./backend/serviceAccountKey.json:/app/serviceAccountKey.json:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s         # gives uvicorn time to fully start before checking

  # --------------------------------------------------------------------------
  # Worker — RQ consumer for async email sending
  # Reuses the exact same Docker image as the backend (no separate Dockerfile).
  # Only the startup command differs.
  # --------------------------------------------------------------------------
  worker:
    build:
      context: ./backend        # same image as backend
    container_name: iss_worker
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    command: ["python", "-m", "app.worker"]
    volumes:
      - ./backend/serviceAccountKey.json:/app/serviceAccountKey.json:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import redis, os; redis.from_url(\"redis://redis:6379/0\").ping()'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # --------------------------------------------------------------------------
  # Frontend — nginx serving the Vite/React build
  # --------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend       # Docker looks for frontend/Dockerfile
      args:
        VITE_API_URL: 
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID}
        VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID}
    container_name: iss_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "8080:80"               # visit http://localhost:8080 in your browser


  mysql:
    image: mysql:8.0
    container_name: iss_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql          # persists your data across restarts
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql:ro  # auto-runs your schema on first start
    ports:
      - "3307:3306"                         # optional: lets you connect via MySQL Workbench
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:       # named volume so Redis data survives container restarts
  uploads_data:     # named volume so uploaded resumes survive container restarts
  mysql_data: 