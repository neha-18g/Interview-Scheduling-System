server {
    listen 80;
    server_name _;

    # Where nginx looks for files to serve
    root /usr/share/nginx/html;
    index index.html;

    # ---------------------------------------------------------------------------
    # API proxy
    # Any request to /api/* gets forwarded to the FastAPI backend container.
    # The trailing slash on proxy_pass strips the /api prefix before forwarding,
    # so /api/slots becomes /slots on the backend.
    # ---------------------------------------------------------------------------
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Allow larger request bodies for resume file uploads (default is 1MB)
        client_max_body_size 20M;
    }

    # ---------------------------------------------------------------------------
    # SPA fallback
    # If the file doesn't exist on disk, serve index.html.
    # This lets React Router handle routes like /dashboard, /admin, etc.
    # ---------------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---------------------------------------------------------------------------
    # Static asset caching
    # JS, CSS, fonts, images get a 30-day cache header.
    # Vite generates hashed filenames so cache-busting is automatic.
    # ---------------------------------------------------------------------------
    location ~* \.(?:js|css|woff2?|ttf|svg|png|jpg|jpeg|gif|ico)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public";
    }
}